<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Unshakable EssentialOS — Deal Analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Montserrat:wght@700;800;900&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="antialiased">
<div id="root">
  <div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;background:radial-gradient(ellipse at top,rgba(255,69,0,0.16),transparent 60%),radial-gradient(ellipse at bottom right,rgba(255,215,0,0.08),transparent 55%),#070707;">
    <style>
      @keyframes eo_spin{to{transform:rotate(360deg)}}
      @keyframes eo_pulse{0%,100%{opacity:.55;transform:scale(.94)}50%{opacity:1;transform:scale(1.06)}}
      @keyframes eo_shimmer{0%{transform:translateX(-120%)}100%{transform:translateX(360%)}}
    </style>
    <div style="position:relative;width:84px;height:84px;display:flex;align-items:center;justify-content:center;">
      <div style="position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg,#FFD700,#FFA500,#FF4500,rgba(255,69,0,0) 78%);-webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 4px),#000 calc(100% - 4px));mask:radial-gradient(farthest-side,transparent calc(100% - 4px),#000 calc(100% - 4px));animation:eo_spin .9s linear infinite;"></div>
      <img src="https://storage.googleapis.com/msgsndr/zQh0YM3EIsWgcjMDTSSC/media/68c95d8f7505d3a75a7fabd2.png" alt="" style="width:38px;height:38px;object-fit:contain;animation:eo_pulse 1.8s ease-in-out infinite;" />
    </div>
    <div style="text-align:center;">
      <p style="font-family:Montserrat,sans-serif;font-weight:800;font-size:1.15rem;letter-spacing:-0.01em;background-image:linear-gradient(to right,#FFD700,#FFA500,#FF4500);-webkit-background-clip:text;background-clip:text;color:transparent;margin:0;">EssentialOS</p>
      <p style="font-family:Inter,sans-serif;font-size:0.72rem;color:#6B7280;margin:6px 0 0;letter-spacing:0.04em;">PREPARING YOUR DEAL ANALYZER</p>
      <div style="margin:16px auto 0;width:168px;height:3px;border-radius:99px;background:#161616;overflow:hidden;position:relative;">
        <span style="position:absolute;top:0;left:0;height:100%;width:38%;border-radius:99px;background-image:linear-gradient(to right,#FFD700,#FFA500,#FF4500);animation:eo_shimmer 1.15s ease-in-out infinite;"></span>
      </div>
    </div>
  </div>
</div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
